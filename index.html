<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>GUNZ - Tank Combat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* === HUD === */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 10;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-left, .hud-right {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hud-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    .hud-value {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }

    .health-bar-outer {
      width: 140px;
      height: 14px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .health-bar-inner {
      height: 100%;
      width: 100%;
      background: #4caf50;
      border-radius: 7px;
      transition: width 0.3s, background-color 0.3s;
    }

    /* === Touch controls overlay === */
    #touch-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      pointer-events: none;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 20px 20px;
    }

    .joystick-zone {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .joystick-knob {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }

    .fire-button {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 50, 50, 0.5);
      border: 3px solid rgba(255, 100, 100, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* === Match overlays (PRE_ROUND, ROUND_END, MATCH_END) === */
    .match-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }

    .match-overlay.hidden {
      display: none;
    }

    /* Enable pointer events only on the match-end overlay (has a button) */
    #match-end-overlay {
      pointer-events: auto;
    }

    .match-overlay-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .round-badge {
      color: #fff;
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }

    .round-score-display {
      color: rgba(255,255,255,0.85);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
    }

    .round-countdown {
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      letter-spacing: 1px;
    }

    .match-result-title {
      font-size: 56px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    #match-restart-btn {
      margin-top: 8px;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: #4caf50;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #match-restart-btn:active {
      background: #388e3c;
      transform: scale(0.96);
    }

    /* === Round indicator (HUD top centre) === */
    #round-indicator {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
      z-index: 11;
    }

    #round-label {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    }

    .round-pips {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pip {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
    }

    .pip-team0.won { background: #4caf50; border-color: #4caf50; }
    .pip-team1.won { background: #f44336; border-color: #f44336; }

    .pip-sep {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      line-height: 1;
    }

    /* === Legacy Game Over (hidden — MatchOverlay handles all end states) === */
    #game-over {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
    }

    #game-over.hidden {
      display: none;
    }

    #game-over h1 {
      color: #f44336;
      font-size: 48px;
      text-shadow: 0 0 20px rgba(244, 67, 54, 0.6);
    }

    #game-over .score-line {
      color: #fff;
      font-size: 24px;
    }

    #restart-btn {
      margin-top: 12px;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: #4caf50;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #restart-btn:active {
      background: #388e3c;
      transform: scale(0.96);
    }

    /* === Kill Feed === */
    #kill-feed {
      position: fixed;
      top: 70px;
      right: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      pointer-events: none;
      z-index: 10;
      max-width: 280px;
    }

    .kf-entry {
      background: rgba(0, 0, 0, 0.55);
      border-left: 2px solid rgba(255, 255, 255, 0.25);
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 13px;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
      opacity: 1;
      transition: opacity 0.5s ease;
      white-space: nowrap;
    }

    .kf-entry.kf-fading {
      opacity: 0;
    }

    /* Player / ally names — green */
    .kf-player {
      color: #4cff80;
    }

    /* Enemy names — red */
    .kf-enemy {
      color: #ff5050;
    }

    /* Fallback — white */
    .kf-neutral {
      color: #ffffff;
    }

    .kf-verb {
      color: rgba(255, 255, 255, 0.65);
      font-weight: 400;
    }

    /* Desktop instructions */
    #desktop-hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      z-index: 10;
      pointer-events: none;
    }

    @media (pointer: coarse) {
      #desktop-hint { display: none; }
    }

    @media (pointer: fine) {
      #touch-controls { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <span class="hud-label">Health</span>
      <div class="health-bar-outer">
        <div class="health-bar-inner" id="health-fill"></div>
      </div>
      <span class="hud-label">Ammo: <span class="hud-value" id="ammo">30</span></span>
    </div>
    <div class="hud-right">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score">0</span>
    </div>
  </div>

  <!-- Mobile touch controls indicator -->
  <div id="touch-controls">
    <div class="joystick-zone">
      <div class="joystick-knob"></div>
    </div>
    <div class="fire-button">FIRE</div>
  </div>


  <!-- Round indicator (HUD top centre — shows round number and win pips) -->
  <div id="round-indicator">
    <div id="round-label">Round 1</div>
    <div id="round-pips" class="round-pips"></div>
  </div>
  <!-- Kill Feed -->
  <div id="kill-feed"></div>

  <!-- Desktop hint -->
  <div id="desktop-hint">WASD to move &middot; Mouse to aim &middot; Click to fire</div>

  <!-- PRE_ROUND: countdown before each round -->
  <div id="pre-round-overlay" class="match-overlay">
    <div class="match-overlay-inner">
      <div class="round-badge">Round <span id="pre-round-number">1</span></div>
      <div class="round-score-display" id="pre-round-score">0 &mdash; 0</div>
      <div class="round-countdown">Starting in <span id="pre-round-timer">3</span>&hellip;</div>
    </div>
  </div>

  <!-- ROUND_END: result + countdown to next round -->
  <div id="round-end-overlay" class="match-overlay hidden">
    <div class="match-overlay-inner">
      <div class="round-badge" id="round-end-title">GREEN TEAM WINS ROUND 1</div>
      <div class="round-score-display" id="round-end-score">1 &mdash; 0</div>
      <div class="round-countdown">Next round in <span id="round-end-timer">5</span>&hellip;</div>
    </div>
  </div>

  <!-- MATCH_END: final result + play again -->
  <div id="match-end-overlay" class="match-overlay hidden">
    <div class="match-overlay-inner">
      <div class="match-result-title" id="match-result-title">VICTORY!</div>
      <div class="round-score-display" id="match-end-score">2 &mdash; 0</div>
      <button id="match-restart-btn">Play Again</button>
    </div>
  </div>

  <!-- Legacy Game Over (kept for HUD.js compatibility, hidden during normal play) -->
  <div id="game-over" class="hidden">
    <h1>DESTROYED</h1>
    <div class="score-line">Score: <span id="final-score">0</span></div>
    <button id="restart-btn">Play Again</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
